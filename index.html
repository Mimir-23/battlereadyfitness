<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-removebg-preview.png" />
    <link rel="apple-touch-icon" href="/logo-removebg-preview.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="description" content="Battle Ready Fitness Bootcamp — high-intensity boot-camp gym in Hialeah, Florida. Personal Training, Bootcamp, Kickboxing, HIIT, Zumba & more. Claim your 3-day free pass." />

    <!-- Critical path: self-hosted fonts + Supabase warm-up. Two preconnects
         on purpose: the content fetch uses a CORS connection (crossorigin) and
         the <img> photos use a plain one — browsers don't share them. -->
    <link rel="preconnect" href="https://wqukiawyqihovkvxswyv.supabase.co" crossorigin />
    <link rel="preconnect" href="https://wqukiawyqihovkvxswyv.supabase.co" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/bebas-neue.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/oswald-var.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-var.woff2" crossorigin />

    <!-- Arranque adelantado: el contenido del sitio se pide DESDE el primer
         byte del HTML, en paralelo con la descarga del bundle (antes iba en
         serie: JS → fetch → foto). Y apenas se sabe cuál es la foto del hero,
         se pre-carga con prioridad alta. React consume window.__contentPromise
         en ContentProvider en vez de repetir la petición. -->
    <script>
      ;(function () {
        var u = '%VITE_SUPABASE_URL%'
        var k = '%VITE_SUPABASE_ANON_KEY%'
        if (!u || !k || u.indexOf('%') === 0) return
        window.__contentPromise = fetch(u + '/rest/v1/site_content?select=key,value', {
          headers: { apikey: k, Authorization: 'Bearer ' + k },
        })
          .then(function (r) { return r.ok ? r.json() : null })
          .catch(function () { return null })
        window.__contentPromise.then(function (rows) {
          if (!rows) return
          for (var i = 0; i < rows.length; i++) {
            if (rows[i].key === 'hero' && rows[i].value && rows[i].value.image) {
              var l = document.createElement('link')
              l.rel = 'preload'
              l.as = 'image'
              l.href = rows[i].value.image
              l.fetchPriority = 'high'
              document.head.appendChild(l)
              return
            }
          }
        })
      })()
    </script>

    <!-- Instant dark shell: the page is branded-dark with a spinner from the very
         first paint, instead of a white flash while the JS bundle downloads. -->
    <style>
      html {
        background: #0a0a0b;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0b;
      }
      #boot span {
        width: 42px;
        height: 42px;
        border: 3px solid #2a2a30;
        border-top-color: #ffd200;
        border-radius: 50%;
        animation: bootspin 0.8s linear infinite;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <title>Battle Ready Fitness Bootcamp — We're Simply Unique</title>

    <!-- Firebase Analytics. Módulo diferido: carga fuera del bundle y sin
         bloquear el pintado. La apiKey de un config web de Firebase es un
         identificador público (no un secreto); la seguridad va por las reglas
         del proyecto, no por ocultar esta llave. -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js'
      import { getAnalytics } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js'

      const firebaseConfig = {

        authDomain: 'battlereadyfitness-f8ac5.firebaseapp.com',
        projectId: 'battlereadyfitness-f8ac5',
        storageBucket: 'battlereadyfitness-f8ac5.firebasestorage.app',
        messagingSenderId: '898879640583',
        appId: '1:898879640583:web:3b96390993eefe5c5046a2',
        measurementId: 'G-DXH57945TD',
      }

      const app = initializeApp(firebaseConfig)
      getAnalytics(app)
    </script>
  </head>

    <div id="root"><div id="boot"><span></span></div></div>
    <script type="module" src="/src/main.jsx"></script>
