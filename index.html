<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-removebg-preview.png" />
    <link rel="apple-touch-icon" href="/logo-removebg-preview.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0b" />
    <meta name="description" content="Battle Ready Fitness Bootcamp — high-intensity boot-camp gym in Hialeah, Florida. Personal Training, Bootcamp, Kickboxing, HIIT, Zumba & more. Claim your 3-day free pass." />

    <!-- Critical path: self-hosted fonts + the LCP hero image (mobile picks the
         828w variant via imagesrcset). No third-party requests before paint. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/bebas-neue.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/oswald-var.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-var.woff2" crossorigin />
    <link
      rel="preload"
      as="image"
      href="/images/hero.webp"
      imagesrcset="/images/hero-sm.webp 828w, /images/hero.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- Instant dark shell: the page is branded-dark with a spinner from the very
         first paint, instead of a white flash while the JS bundle downloads. -->
    <style>
      html {
        background: #0a0a0b;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0b;
      }
      #boot span {
        width: 42px;
        height: 42px;
        border: 3px solid #2a2a30;
        border-top-color: #ffd200;
        border-radius: 50%;
        animation: bootspin 0.8s linear infinite;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <title>Battle Ready Fitness Bootcamp — We're Simply Unique</title>
  </head>
  <body>
    <div id="root"><div id="boot"><span></span></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
